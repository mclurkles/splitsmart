services:
  - type: web
    name: splitsmart
    env: python
    pythonVersion: "3.11"
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: splitsmart-db
          property: connectionString
      - key: BASE_URL
        value: https://splitsmart-zioo.onrender.com  # UPDATE THIS

databases:
  - name: splitsmart-db
    plan: free
    databaseName: splitsmart
    user: splitsmart
