{% extends "base.html" %}
{% block title %}Login – SplitSmart{% endblock %}
{% block content %}
<div style="max-width: 400px; margin: 2rem auto;">
    <h1>Welcome back</h1>
    <p class="text-dim mt-1" style="margin-bottom: 1.5rem;">Log in to your SplitSmart account</p>

    <div class="card">
        <form method="POST">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required autofocus placeholder="you@email.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required placeholder="••••••••">
            </div>
            <div class="form-group" style="display:flex; align-items:center; gap:0.5rem;">
                <input type="checkbox" name="remember" id="remember" style="width:auto; accent-color: var(--accent)">
                <label for="remember" style="text-transform:none; letter-spacing:0; margin:0; color:var(--text-dim);">Remember me</label>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Log in</button>
        </form>
    </div>

    <p class="text-center text-dim text-sm mt-4">
        No account? <a href="{{ url_for('auth.register') }}" style="color: var(--accent);">Sign up free</a>
    </p>
</div>
{% endblock %}
