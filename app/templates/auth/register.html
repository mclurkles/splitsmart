{% extends "base.html" %}
{% block title %}Sign up – SplitSmart{% endblock %}
{% block content %}
<div style="max-width: 400px; margin: 2rem auto;">
    <h1>Create account</h1>
    <p class="text-dim mt-1" style="margin-bottom: 1.5rem;">Start splitting smarter</p>

    <div class="card">
        <form method="POST">
            <div class="form-group">
                <label>Full name <span style="color:var(--accent)">*</span></label>
                <input type="text" name="name" required placeholder="Your name">
            </div>
            <div class="form-group">
                <label>Email <span style="color:var(--accent)">*</span></label>
                <input type="email" name="email" required placeholder="you@email.com">
            </div>
            <div class="form-group">
                <label>Phone <span style="color:var(--text-dimmer);">(optional, for lookup)</span></label>
                <input type="tel" name="phone" placeholder="+61 400 000 000">
            </div>
            <div class="form-group">
                <label>Password <span style="color:var(--accent)">*</span></label>
                <input type="password" name="password" required placeholder="Minimum 8 characters">
            </div>
            <div class="form-group">
                <label>Confirm password <span style="color:var(--accent)">*</span></label>
                <input type="password" name="confirm_password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary btn-block">Create account</button>
        </form>
    </div>

    <p class="text-center text-dim text-sm mt-4">
        Already have an account? <a href="{{ url_for('auth.login') }}" style="color: var(--accent);">Log in</a>
    </p>
</div>
{% endblock %}
