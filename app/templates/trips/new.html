{% extends "base.html" %}
{% block title %}New Trip – SplitSmart{% endblock %}
{% block content %}
<h1>New trip or event</h1>
<p class="text-dim mt-1" style="margin-bottom: 1.5rem;">What are you splitting?</p>

<div class="card">
    <form method="POST">
        <div class="form-group">
            <label>Type</label>
            <div class="type-toggle">
                <div class="type-option">
                    <input type="radio" name="trip_type" id="type-trip" value="trip" checked>
                    <label for="type-trip">
                        <span class="type-icon">🗺️</span>
                        Trip
                        <span style="font-size:0.72rem; color:var(--text-dimmer); font-weight:400;">Multiple expenses</span>
                    </label>
                </div>
                <div class="type-option">
                    <input type="radio" name="trip_type" id="type-event" value="event">
                    <label for="type-event">
                        <span class="type-icon">⚡</span>
                        Event
                        <span style="font-size:0.72rem; color:var(--text-dimmer); font-weight:400;">Single expense</span>
                    </label>
                </div>
            </div>
        </div>

        <div class="form-group">
            <label>Name <span style="color:var(--accent)">*</span></label>
            <input type="text" name="name" required placeholder="e.g. Bali 2025, Friday dinner...">
        </div>

        <div class="form-group">
            <label>Description <span style="color:var(--text-dimmer);">(optional)</span></label>
            <textarea name="description" rows="2" placeholder="Any notes..."></textarea>
        </div>

        <div class="form-group">
            <label>Base currency</label>
            <select name="currency">
                {% for c in currencies %}
                    <option value="{{ c }}" {% if c == 'AUD' %}selected{% endif %}>{{ c }}</option>
                {% endfor %}
            </select>
        </div>

        <button type="submit" class="btn btn-primary btn-block">Create</button>
    </form>
</div>
{% endblock %}
