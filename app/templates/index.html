<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SplitSmart – Split expenses with friends</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0d0d14; --accent: #7c6af7; --accent3: #6cf7c3;
            --text: #e8e8f5; --text-dim: #8888aa;
        }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem 1.5rem;
        }
        .logo {
            font-family: 'Syne', sans-serif;
            font-size: 2.8rem;
            font-weight: 800;
            color: var(--accent);
            margin-bottom: 0.5rem;
            animation: fadeUp 0.6s ease both;
        }
        .logo span { color: var(--text); }
        .tagline {
            font-size: 1.1rem;
            color: var(--text-dim);
            margin-bottom: 2.5rem;
            animation: fadeUp 0.6s 0.1s ease both;
        }
        .features {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 2.5rem;
            max-width: 320px;
            animation: fadeUp 0.6s 0.2s ease both;
        }
        .feature {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-align: left;
            font-size: 0.9rem;
            color: var(--text-dim);
        }
        .feature-icon {
            width: 36px;
            height: 36px;
            background: rgba(124,106,247,0.15);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
        }
        .btns {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            justify-content: center;
            animation: fadeUp 0.6s 0.3s ease both;
        }
        .btn {
            padding: 0.75rem 1.75rem;
            border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.15s;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: #6a59e0; transform: translateY(-2px); }
        .btn-ghost { color: var(--text-dim); border: 1px solid #2a2a45; }
        .btn-ghost:hover { color: var(--text); border-color: var(--accent); }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="logo">Split<span>Smart</span></div>
    <p class="tagline">Shared expenses, simplified. No drama.</p>
    <div class="features">
        <div class="feature">
            <div class="feature-icon">🧾</div>
            <span>Log expenses for trips or one-off events</span>
        </div>
        <div class="feature">
            <div class="feature-icon">📱</div>
            <span>Invite friends via QR code instantly</span>
        </div>
        <div class="feature">
            <div class="feature-icon">🧮</div>
            <span>Auto-calculates the fewest payments needed</span>
        </div>
        <div class="feature">
            <div class="feature-icon">💱</div>
            <span>Multi-currency, defaults to AUD</span>
        </div>
    </div>
    <div class="btns">
        <a href="{{ url_for('auth.register') }}" class="btn btn-primary">Get started free</a>
        <a href="{{ url_for('auth.login') }}" class="btn btn-ghost">Log in</a>
    </div>
</body>
</html>
